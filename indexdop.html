<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр шоурила</title>
    <link rel="stylesheet" href="style/style.css">
    <style>
        /* Стили только для этой страницы */
        body {
            background-color: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .video-content {
            position: relative;
            width: 90%;
            max-width: 1100px;
        }
        video {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(95, 123, 178, 0.4);
            display: block;
        }
        .close-view {
            position: absolute;
            top: -60px;
            right: 0;
            color: #fff;
            font-size: 50px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: 0.3s;
        }
        .close-view:hover {
            color: var(--accent-blue);
        }
    </style>
</head>
<body>

    <div class="video-content">
        <a href="index.html" class="close-view">&times;</a>
        
        <video autoplay controls>
            <source src="video/1.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

</body>
</html>
